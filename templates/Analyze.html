<!DOCTYPE html>
<html>
<head>
    <title>Perform Analysis</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f9; padding: 50px; }
        .container { max-width: 600px; margin: auto; background: white; padding: 30px; border-radius: 10px; }
        textarea { width: 100%; height: 150px; margin-bottom: 20px; padding: 10px; border: 1px solid #ddd; border-radius: 5px; }
        button { background: #007bff; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Run New Security Analysis</h2>
        <form method="POST">
            <textarea name="text" placeholder="Paste data here to analyze for risks..."></textarea>
            <button type="submit">Start Analysis</button>
        </form>
        <br><a href="/dashboard">Back to Dashboard</a>
    </div>
</body>
</html>
